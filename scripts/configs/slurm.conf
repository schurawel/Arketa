# slurm.conf file generated for Vagrant cluster
ClusterName=vagrant-cluster
SlurmctldHost=slurm-controller

# Network
SlurmctldPort=6817
SlurmdPort=6818

# Authentication
AuthType=auth/munge
MpiDefault=pmix

# Scheduling
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

# Process tracking with cgroups v2
ProctrackType=proctrack/cgroup
TaskPlugin=task/affinity,task/cgroup
SlurmdUser=root

# Logging
SlurmctldDebug=info
SlurmdDebug=info
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

# State info
StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd

# Process IDs
SlurmctldPidFile=/opt/slurm/var/run/slurmctld.pid
SlurmdPidFile=/run/slurm/slurmd.pid

# Timeouts
SlurmctldTimeout=120
SlurmdTimeout=300
InactiveLimit=0
MinJobAge=300
KillWait=30
Waittime=0

# Return to service
ReturnToService=1

# Job completion
JobCompType=jobcomp/none

# Job accounting with cgroups v2 support
JobAcctGatherType=jobacct_gather/cgroup
JobAcctGatherFrequency=30

# Accounting storage (connect to slurmdbd)
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=localhost

# Node definitions (controller + 2 compute nodes)
NodeName=slurm-controller,node1,node2 CPUs=2 Sockets=1 CoresPerSocket=2 ThreadsPerCore=1 RealMemory=1800 State=UNKNOWN

# Partition definitions (controller + 2 compute nodes)
PartitionName=compute Nodes=slurm-controller,node1,node2 Default=YES MaxTime=INFINITE State=UP
